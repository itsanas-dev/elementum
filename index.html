<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- This favicon crap is ridiculous, fuck Firefox in particular -->
    
    <link data-first="true" rel="icon" href="/favicon-dark.svg?v=3" type="image/svg+xml" media="(prefers-color-scheme: light)">
    <link rel="icon" href="/favicon-light.svg?v=3" type="image/svg+xml" media="(prefers-color-scheme: dark)">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>Elementum</title>

      <style>
        @layer reset, base, layout, utilities;

        :root {
          --default-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
          --color-bg: #141414;
          --color-text: #f1f1f1;
        }

        :root[data-theme="light"] {
          --color-bg: #eeeeee;
          --color-text: #151515;
        }

        @layer base {
          body {
            background-color: var(--color-bg);
            line-height: 1.2;
          }
            
          .no-script {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

            font-weight: 700;
            font-size: 2rem;
            text-align: center;
          }
        }
        
        @layer reset {
          button, input, body, label, textarea, dialog {
            font-family: var(--default-font-family);
            color: var(--color-text);
          }
          *, *::before, *::after {
            box-sizing: border-box;
          }
  
          * {
            margin: 0;
          }
        }
      </style>

      <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin="anonymous">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400&display=swap">
    </head>
  <body>
    <noscript>
      <div class="no-script">
        JavaScript is required to run this app.
      </div>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
